<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Opening DeadFy...</title>
  <style>
    body { background: #0f0e17; color: #c9b1ff; font-family: sans-serif;
           display: flex; align-items: center; justify-content: center;
           height: 100vh; margin: 0; flex-direction: column; gap: 12px; }
    p { opacity: 0.7; font-size: 14px; }
    a { color: #c9b1ff; font-size: 12px; opacity: 0.5; margin-top: 16px; }
  </style>
</head>
<body>
  <h2>🎵 Opening DeadFy...</h2>
  <p id="msg">Launching the app</p>
  <a href="https://github.com/Takanajson/DeadFy/releases/latest">
    Don't have DeadFy? Download it
  </a>
  <script>
    window.location = "deadfy://play" + window.location.search;
    setTimeout(() => {
      document.getElementById("msg").textContent =
        "If nothing happened, make sure DeadFy is installed and opened at least once.";
    }, 2000);
  </script>
</body>
</html>
